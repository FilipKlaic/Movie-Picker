<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Movie Night Picker</title>
</head>
<body>
    <main class="app">
        <header class="app-header">
            <h1>Movie Night Picker</h1>
            <p>Välj genre och eller år så slumpar vi en film åt dig!</p>
        </header>

        <section class="controls">
            <form id="movieForm">
                <div class="field">
                    <label for="genreSelect">Genre</label>
                    <select id="genreSelect" name="genre">
                        <option value="">Alla genrer</option>
                    </select>
                </div>
                <div class="field">
                    <label for="yearInput">År</label>
                    <input type="number" id="yearInput" name="year" min="1900" max="2026" placeholder="Ex: 2016">
                </div>
                <div class="field">
                    <div class="range-header">
                        <label for="ratingInput">Minst betyg</label>
                        <span id="ratingValue">0.0+</span>
                    </div>
                    <input type="range" id="ratingInput" name="rating" min="0" max="10" step="0.5" value="0">
                </div>
                <div class="field">
                    <label for="qualityMode">Kvalitetsläge</label>
                    <select id="qualityMode" name="qualityMode">
                        <option value="balanced">Balanserad</option>
                        <option value="popular">Populära favoriter</option>
                        <option value="hidden">Hidden gems</option>
                    </select>
                </div>
                <button type="submit" id="pickBtn">Hitta film</button>
            </form>
        </section>

        <section class="status-area">
            <p id="statusMessage" aria-live="polite"></p>
        </section>

        <section class="result-area">
            <article id="movieCard" class="movie-card" hidden>
                <img id="moviePoster" src="" alt="Movie Poster"/>
                <div class="movie-info">
                    <h2 id="movieTitle"></h2>
                    <p id="movieMeta"></p>
                    <p id="movieOverview"></p>
                    <section class="providers" aria-live="polite">
                        <p class="providers-title">Var kan jag se den?</p>
                        <p id="providerMessage">Laddar streamingtjänster...</p>
                        <div id="providerList" class="provider-list"></div>
                        <a id="providerLink" href="#" target="_blank" rel="noopener noreferrer" hidden>Se alla alternativ</a>
                    </section>
                    <div class="movie-actions">
                        <button id="rerollBtn" type="button">Slumpa ny film</button>
                        <button id="seenBtn" type="button">Visa inte igen</button>
                        <a id="trailerLink" href="#" target="_blank" rel="noopener noreferrer">Se trailer</a>
                    </div>
                </div>
            </article>
        </section>
    </main>
    <script src="config.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
